# =================================================================
# Project Ulfius: Mosquitto Broker Config (V2.1.3)
# =================================================================

# --- 1. 監聽器設定 (Listeners) ---

# 標準 MQTT (給 Pico 2 WH 的 Core 1 進行基礎數據串接)
# 指定 0.0.0.0 確保 Docker 外部實體網路可連入
listener 1883 0.0.0.0
protocol mqtt

# 加密 MQTT (Ulfius 騎士團：TLS 1.2 安全傳輸)
listener 8883 0.0.0.0
protocol mqtt
# 修正：改用自簽章證書建議路徑與命名
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
# 自簽章測試階段不強制要求客戶端證書
require_certificate false
tls_version tlsv1.2
# ciphers DEFAULT:!aNULL:!eNULL:!LOW:!EXPORT:!SSLv2
ciphers DEFAULT:@SECLEVEL=0

# 標準 WebSocket (給 React Dashboard 進行即時監控數據流)
listener 9001 0.0.0.0
protocol websockets

# 加密 WebSocket (未來若 React 部署至 HTTPS 環境時使用)
listener 9002 0.0.0.0
protocol websockets
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
tls_version tlsv1.2

# --- 2. 持久化與日誌 (Persistence & Logging) ---

# 確保感測器數據與配置在容器重啟後不會丟失
persistence true
persistence_location /mosquitto/data/

# 修正：log_dest 必須與 entrypoint.sh 中 mkdir -p 的路徑一致
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
connection_messages true

# --- 3. 安全性認證 (Security) ---

# 修正：路徑必須指向 entrypoint.sh 中生成 passwordfile 的絕對路徑
allow_anonymous false
password_file /mosquitto/passwordfile

# 限制連線數 (依據硬體資源調整，防止異常連線佔滿資源)
max_connections -1

# =================================================================

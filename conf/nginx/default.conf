# 與 default.image.conf 對齊；compose 會掛載本檔覆寫映像內設定。
# 後端在本機、僅 Nginx 用 Docker 時，請參考 default.upstream-local.example
#
# limit_req_zone 須在 http 內（conf.d 由主設定 include，故可置於此檔頂端）。
# Cloudflare 真實 IP：見同目錄 cloudflare-real-ip.conf（由 docker-compose 掛載）。

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream iiot_backend {
    server backend_api:5163;
    # 宿主機 dotnet run 須監聽 0.0.0.0:5163（見 Api launchSettings），否則僅 localhost 時 Docker 內 Nginx 會 502
    # server host.docker.internal:5163;
    keepalive 32;
}

# HTTP → HTTPS（瀏覽器與驗收請以 https:// 為 origin）
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 10m;

    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://iiot_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
